name: metro-modern-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.1.5)"
        required: true
      release_name:
        description: "Release title"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify quality gates
        run: mvn -B -pl metro-modern -am verify

      - name: Build artifact
        run: mvn -B -pl metro-modern -am package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: metro-modern-jar
          path: metro-modern/target/*.jar

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.release_name }}
          files: metro-modern/target/*.jar
