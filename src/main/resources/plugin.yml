name: Metro
version: '1.1.7'
main: org.cubexmc.metro.Metro
api-version: '1.16'
folia-supported: true
authors: [aqing,angushushu, wwwer]
description: 简易地铁管理系统，阿清适配MC1.16+
website: https://cubexmc.org
softdepend:
  - ViaVersion
  - Vault
  - BlueMap
  - dynmap
  - squaremap


permissions:
  metro.admin:
    description: Allow use of Metro plugin admin commands
    default: op
    children:
      metro.tp: true
  metro.use:
    description: Allow players to use Metro plugin features (such as riding trains)
    default: true
  metro.gui:
    description: Allow players to open the Metro GUI
    default: true
  metro.tp:
    description: Allow players to teleport to stops via GUI
    default: false
  metro.line.create:
    description: Allow players to create new metro lines
    default: false
  metro.stop.create:
    description: Allow players to create new stops
    default: false
  metro.portal.create:
    description: Allow players to create new minecart portals
    default: false
